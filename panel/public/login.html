<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>X-Agents - Login</title>
  <script id="xpanel-theme-preload">(function(){var r=document.documentElement;function p(){r.style.setProperty("--bg","#0b1020");r.style.setProperty("--panel-bg","#121a2e");r.style.setProperty("--topbar-bg","#111b31");r.style.setProperty("--sidebar-bg","#0f172a");r.style.setProperty("--text","#e2e8f0");r.style.setProperty("--muted","#94a3b8");r.style.setProperty("--panel-border","#24324d");r.style.setProperty("--input-bg","#0f172a");r.style.setProperty("--input-border","#334155");}function a(t){if(!t||!t.vars)return;for(var k in t.vars){if(String(k).indexOf("--")===0){r.style.setProperty(k,String(t.vars[k]));}}var m=String(t.mode||"");r.dataset.themeMode=m;r.dataset.theme=String(t.slug||"");try{localStorage.setItem("xpanel.theme.mode",m);}catch(e){}}try{var lm=localStorage.getItem("xpanel.theme.mode");if(lm==="dark"){p();r.dataset.themeMode="dark";}var c=localStorage.getItem("xpanel.theme.cache.v1");if(c){a(JSON.parse(c));return;}var x=new XMLHttpRequest();x.open("GET","/api/theme/public",false);x.send(null);if(x.status>=200&&x.status<300){var d=JSON.parse(x.responseText||"{}");if(d&&d.theme){a(d.theme);localStorage.setItem("xpanel.theme.cache.v1",JSON.stringify(d.theme));}}}catch(e){}})();</script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/styles.css" />
  <script src="/static/js/theme-loader.js"></script>
</head>
<body class="login-page">
  <label class="login-lang-switch" for="loginLangSelect">
    <span id="loginLangLabel">Language</span>
    <select id="loginLangSelect" aria-label="Language">
      <option value="en">English</option>
      <option value="pt-BR">Portugues (BR)</option>
    </select>
  </label>
  <div class="login-layout">
    <aside class="login-hero">
      <div class="login-brand">
        <span class="brand-badge">XP</span>
        <div>
          <h1>X-Agents</h1>
          <p>AI agents control workspace</p>
        </div>
      </div>
      <div class="hero-points">
        <div class="hero-item">
          <span class="hero-icon">
            <svg viewBox="0 0 24 24" fill="none"><path d="M4 12h16M12 4v16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          </span>
          <div>
            <strong>Fast deployment</strong>
            <small>Apps, sites, and services in a few clicks</small>
          </div>
        </div>
        <div class="hero-item">
          <span class="hero-icon">
            <svg viewBox="0 0 24 24" fill="none"><path d="M12 3 4 7v5c0 5 3.4 8 8 9 4.6-1 8-4 8-9V7l-8-4Z" stroke="currentColor" stroke-width="1.8"/></svg>
          </span>
          <div>
            <strong>Built-in security</strong>
            <small>Permissions, logs, and per-user auditing</small>
          </div>
        </div>
        <div class="hero-item">
          <span class="hero-icon">
            <svg viewBox="0 0 24 24" fill="none"><path d="M6 17V7m6 10V4m6 13v-7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          </span>
          <div>
            <strong>Real-time monitoring</strong>
            <small>CPU, memory, disk, and services in one panel</small>
          </div>
        </div>
      </div>
    </aside>

    <section class="login-panel">
      <div class="login-card-modern">
        <h2>Sign in to panel</h2>
        <p class="login-subtitle">Sign in with your username and password to continue.</p>
        <form id="loginForm">
          <label for="username">Username</label>
          <div class="input-wrap">
            <span class="field-icon">
              <svg viewBox="0 0 24 24" fill="none"><path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Zm-7 8a7 7 0 1 1 14 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
            </span>
            <input id="username" type="text" value="admin" required />
          </div>

          <label for="password">Password</label>
          <div class="input-wrap">
            <span class="field-icon">
              <svg viewBox="0 0 24 24" fill="none"><rect x="4" y="11" width="16" height="9" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="M8 11V8a4 4 0 1 1 8 0v3" stroke="currentColor" stroke-width="1.8"/></svg>
            </span>
            <input id="password" type="password" required />
          </div>

          <button id="loginBtn" type="submit">Sign in to X-Agents</button>
          <div id="error" class="error"></div>
        </form>
      </div>
    </section>
  </div>

  <script>
    const LOGIN_LANG_KEY = 'xagents.ui.lang';
    const LOGIN_DEFAULT_LANG = 'en';
    const LOGIN_TEXTS = [
      ['Language', 'Idioma'],
      ['English', 'Ingles'],
      ['Portuguese (BR)', 'Portugues (BR)'],
      ['X-Agents - Login', 'X-Agents - Login'],
      ['AI agents control workspace', 'Workspace de controle de agentes IA'],
      ['Workspace de controle de agentes IA', 'Workspace de controle de agentes IA'],
      ['Fast deployment', 'Deploy rapido'],
      ['Deploy rapido', 'Deploy rapido'],
      ['Multi-account execution and agent management', 'Execucao multi-conta e gerenciamento de agentes'],
      ['Execucao multi-conta e gerenciamento de agentes', 'Execucao multi-conta e gerenciamento de agentes'],
      ['Built-in security', 'Seguranca integrada'],
      ['Seguranca integrada', 'Seguranca integrada'],
      ['Permissions, logs, and encrypted integrations', 'Permissoes, logs e integracoes criptografadas'],
      ['Permissoes, logs e integracoes criptografadas', 'Permissoes, logs e integracoes criptografadas'],
      ['Real-time monitoring', 'Monitoramento em tempo real'],
      ['Monitoramento em tempo real', 'Monitoramento em tempo real'],
      ['Realtime tasks, sessions, and WhatsApp routing', 'Tarefas, sessoes e roteamento WhatsApp em tempo real'],
      ['Tarefas, sessoes e roteamento WhatsApp em tempo real', 'Tarefas, sessoes e roteamento WhatsApp em tempo real'],
      ['Sign in to panel', 'Acessar painel'],
      ['Acessar painel', 'Acessar painel'],
      ['Sign in with your username and password to continue.', 'Entre com seu usuario e senha para continuar.'],
      ['Entre com seu usuario e senha para continuar.', 'Entre com seu usuario e senha para continuar.'],
      ['Username', 'Usuario'],
      ['Usuario', 'Usuario'],
      ['Password', 'Senha'],
      ['Senha', 'Senha'],
      ['Sign in to X-Agents', 'Entrar no X-Agents'],
      ['Entrar no X-Agents', 'Entrar no X-Agents'],
      ['Signing in...', 'Entrando...'],
      ['Entrando...', 'Entrando...'],
      ['Login failed', 'Falha no login'],
      ['Falha no login', 'Falha no login']
    ];
    const loginTextIndex = new Map();
    LOGIN_TEXTS.forEach(([en, pt]) => {
      const pair = { en, 'pt-BR': pt };
      loginTextIndex.set(String(en).normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/\s+/g, ' ').trim().toLowerCase(), pair);
      loginTextIndex.set(String(pt).normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/\s+/g, ' ').trim().toLowerCase(), pair);
    });

    function getLoginLang() {
      try {
        const stored = localStorage.getItem(LOGIN_LANG_KEY);
        return stored === 'pt-BR' ? 'pt-BR' : LOGIN_DEFAULT_LANG;
      } catch (err) {
        return LOGIN_DEFAULT_LANG;
      }
    }

    function setLoginLang(lang, reload = true) {
      const next = lang === 'pt-BR' ? 'pt-BR' : LOGIN_DEFAULT_LANG;
      try {
        localStorage.setItem(LOGIN_LANG_KEY, next);
      } catch (err) {
        // ignore storage failures
      }
      document.documentElement.lang = next;
      if (reload) window.location.reload();
      return next;
    }

    function loginText(value, lang = getLoginLang()) {
      const raw = String(value ?? '');
      const entry = loginTextIndex.get(raw.normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/\s+/g, ' ').trim().toLowerCase());
      return entry ? entry[lang] || entry.en || raw : raw;
    }

    function applyLoginTranslations() {
      const lang = setLoginLang(getLoginLang(), false);
      document.title = loginText(document.title, lang);
      const select = document.getElementById('loginLangSelect');
      const label = document.getElementById('loginLangLabel');
      if (label) label.textContent = loginText('Language', lang);
      if (select) {
        select.innerHTML = `
          <option value="en">${loginText('English', lang)}</option>
          <option value="pt-BR">${loginText('Portuguese (BR)', lang)}</option>
        `;
        select.value = lang;
        select.setAttribute('aria-label', loginText('Language', lang));
      }
      const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, {
        acceptNode(node) {
          if (!node || !node.textContent || !node.textContent.trim()) return NodeFilter.FILTER_REJECT;
          if (node.parentElement && node.parentElement.closest('script, style, textarea, input')) return NodeFilter.FILTER_REJECT;
          return NodeFilter.FILTER_ACCEPT;
        }
      });
      const nodes = [];
      while (walker.nextNode()) nodes.push(walker.currentNode);
      nodes.forEach((node) => {
        const translated = loginText(node.textContent, lang);
        if (translated !== node.textContent) node.textContent = translated;
      });
      document.querySelectorAll('[placeholder],[title],[aria-label]').forEach((el) => {
        ['placeholder', 'title', 'aria-label'].forEach((attr) => {
          if (!el.hasAttribute(attr)) return;
          const translated = loginText(el.getAttribute(attr), lang);
          if (translated !== el.getAttribute(attr)) el.setAttribute(attr, translated);
        });
      });
    }

    const form = document.getElementById('loginForm');
    const error = document.getElementById('error');
    const loginBtn = document.getElementById('loginBtn');
    const loginLangSelect = document.getElementById('loginLangSelect');

    applyLoginTranslations();

    if (loginLangSelect) {
      loginLangSelect.addEventListener('change', (event) => {
        setLoginLang(String(event.target.value || LOGIN_DEFAULT_LANG));
      });
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      error.textContent = '';
      loginBtn.disabled = true;
      loginBtn.textContent = loginText('Signing in...');

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();
        if (!res.ok) {
          error.textContent = loginText(data.error || 'Login failed');
          return;
        }

        window.location.href = '/';
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = loginText('Sign in to X-Agents');
      }
    });
  </script>
</body>
</html>
